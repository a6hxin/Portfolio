<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact · Abhishek Sable</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="nav">
      <div class="nav__brand">
        <span class="nav__logo-circle">A's</span>
        <span class="nav__brand-text">Abhishek Sable</span>
      </div>
      <nav class="nav__links">
        <a href="index.html">Profile</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="skills.html">Skills</a>
        <a href="contact.html">Contact</a>
      </nav>
      <button class="nav__toggle" aria-label="Toggle navigation">
        <span></span><span></span>
      </button>
    </header>

    <main>
      <section class="section section--accent">
        <div class="section__header">
          <h2>Contact</h2>
          <p>Let’s build something together.</p>
        </div>
        <div class="contact">
          <p>
            Ready to collaborate or have a project in mind? Drop your email and
            message below and I’ll reply within 1–2 days.
          </p>
          <form id="contact-form" class="contact-form">
            <div class="contact-form__field">
              <label for="contact-email">Your email</label>
              <input
                type="email"
                id="contact-email"
                name="email"
                placeholder="you@example.com"
                required
              />
            </div>
            <div class="contact-form__field">
              <label for="contact-message">Message</label>
              <textarea
                id="contact-message"
                name="message"
                rows="4"
                placeholder="Tell me a bit about your project or question..."
                required
              ></textarea>
            </div>
            <button type="submit" class="btn btn--primary">
              Send Message
            </button>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© <span id="year"></span> Abhishek Sable. All rights reserved.</p>
      <div class="footer__links">
        <a href="https://github.com/a6hxin" target="_blank" rel="noreferrer">GitHub</a>
        <a href="https://www.linkedin.com/in/a6hxin" target="_blank" rel="noreferrer"
          >LinkedIn</a
        >
      </div>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
